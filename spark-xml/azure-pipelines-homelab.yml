# ============================================================
# Azure DevOps Pipeline  Build Patched spark-xml JAR
# Fixes: woodstox-core CVE (upgraded to 7.1.1)
# Output: spark-xml_2.12-0.18.0-patched.jar
# ============================================================
# HOMELAB VERSION   self-hosted agent on Talos K8s
# To replicate at work: change pool.name to your work pool
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - spark-xml/build.sbt
      - spark-xml/src/**
      - spark-xml/project/**

pool:
  name:
    homelab-pool # Self-hosted agent on Talos K8s
    # Work replication: change to your work pool name

variables:
  SBT_VERSION: "1.7.3"
  SCALA_VERSION: "2.12.15"
  JAR_NAME: "spark-xml-assembly-0.18.0.jar"
  PATCHED_JAR_NAME: "spark-xml_2.12-0.18.0-patched.jar"
  SPARK_XML_DIR: "$(Build.SourcesDirectory)/spark-xml" # subfolder path

stages:
  # ============================================================
  # STAGE 1  Preflight Checks
  # ============================================================
  - stage: Preflight
    displayName: "Preflight Checks"
    jobs:
      - job: CheckEnvironment
        displayName: "Verify Agent Environment"
        steps:
          - script: |
              echo "=== Agent Info ==="
              echo "Agent Name:    $(Agent.Name)"
              echo "Agent OS:      $(Agent.OS)"
              echo "Agent Machine: $(Agent.MachineName)"
              echo "Working Dir:   $(Agent.WorkFolder)"
            displayName: "Print Agent Info"

          - script: |
              echo "=== Checking Java ==="
              if ! command -v java &> /dev/null; then
                echo "WARNING: Java not found on agent - will be installed in Build stage"
              else
                java -version 2>&1
                echo "[OK] Java found"
              fi
              echo ""
              echo "=== Checking Internet Connectivity ==="
              curl -sf --max-time 10 https://repo1.maven.org/maven2 > /dev/null \
                && echo "[OK] repo1.maven.org reachable" \
                || (echo "[FAIL] ERROR: Cannot reach Maven Central - check agent network/proxy" && exit 1)
              curl -sf --max-time 10 https://repo.scala-sbt.org > /dev/null \
                && echo "[OK] repo.scala-sbt.org reachable" \
                || (echo "[FAIL] ERROR: Cannot reach SBT repo - check agent network/proxy" && exit 1)
            displayName: "Check Java & Network Access"

          - script: |
              echo "=== Checking woodstox CVE fix in build.sbt ==="
              grep -n "woodstox" build.sbt \
                && echo "[OK] woodstox override confirmed in build.sbt" \
                || (echo "ERROR: woodstox 7.1.1 override missing from build.sbt!" && exit 1)
            displayName: "Verify CVE Fix Present"
            workingDirectory: "$(SPARK_XML_DIR)"

  # ============================================================
  # STAGE 2  Build
  # ============================================================
  - stage: Build
    displayName: "Build Patched JAR"
    dependsOn: Preflight
    jobs:
      - job: BuildJar
        displayName: "SBT Assembly (Scala 2.12)"
        timeoutInMinutes: 30

        steps:
          # --- Cache SBT ivy dependencies ---
          # Speeds up subsequent runs significantly (~15min  ~2min)
          - task: Cache@2
            displayName: "Cache SBT ivy2"
            inputs:
              key: 'sbt-ivy | "$(Agent.OS)" | $(SPARK_XML_DIR)/build.sbt | $(SPARK_XML_DIR)/project/build.properties'
              restoreKeys: |
                sbt-ivy | "$(Agent.OS)"
              path: "$(HOME)/.sbt"

          - task: Cache@2
            displayName: "Cache Coursier"
            inputs:
              key: 'coursier | "$(Agent.OS)" | $(SPARK_XML_DIR)/build.sbt'
              restoreKeys: |
                coursier | "$(Agent.OS)"
              path: "$(HOME)/.cache/coursier"

          # --- Install Java 11 if not present ---
          - script: |
              if command -v java &> /dev/null; then
                echo "[OK] Java already installed:"
                java -version 2>&1
              else
                echo "Java not found - installing JDK 11..."
                sudo apt-get update -q
                sudo apt-get install -y -q openjdk-11-jdk
                echo "[OK] Java installed:"
                java -version 2>&1
              fi
              echo "JAVA_HOME candidates:"
              update-java-alternatives -l 2>/dev/null || true
              export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
              echo "JAVA_HOME set to: $JAVA_HOME"
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME"
            displayName: "Install / Verify Java"

          # --- Install SBT via direct binary download (avoids apt GPG key issues) ---
          - script: |
              if command -v sbt &> /dev/null; then
                echo "[OK] SBT already installed: $(sbt --version 2>&1 | head -1)"
              else
                echo "Installing SBT $(SBT_VERSION) via direct download..."
                curl -fL "https://github.com/sbt/sbt/releases/download/v$(SBT_VERSION)/sbt-$(SBT_VERSION).tgz" \
                  -o /tmp/sbt.tgz
                sudo tar xzf /tmp/sbt.tgz -C /usr/local/
                sudo ln -s /usr/local/sbt/bin/sbt /usr/local/bin/sbt
                rm /tmp/sbt.tgz
                echo "[OK] SBT installed"
              fi
              sbt --version
            displayName: "Install / Verify SBT"

          # --- Build for Scala 2.12 ---
          - script: |
              echo "=== Building spark-xml for Scala $(SCALA_VERSION) ==="
              sbt -v "++ $(SCALA_VERSION)" clean assembly
            displayName: "SBT Assembly"
            workingDirectory: "$(SPARK_XML_DIR)"

          # --- Verify JAR contents ---
          - script: |
              JAR_PATH=$(find target -name "$(JAR_NAME)" | head -1)

              if [ -z "$JAR_PATH" ]; then
                echo "ERROR: JAR not found! Build may have failed."
                exit 1
              fi

              echo "=== JAR found: $JAR_PATH ==="
              ls -lh "$JAR_PATH"

              echo ""
              echo "=== Verifying woodstox inside JAR ==="
              WOODSTOX_FILES=$(jar tf "$JAR_PATH" | grep -i "woodstox\|ctc/wstx" | head -10)
              if [ -z "$WOODSTOX_FILES" ]; then
                echo "ERROR: woodstox classes not found in JAR!"
                exit 1
              fi
              echo "$WOODSTOX_FILES"
              echo "[OK] woodstox classes confirmed in JAR"

              echo ""
              echo "=== Copying to staging ==="
              cp "$JAR_PATH" "$(Build.ArtifactStagingDirectory)/$(PATCHED_JAR_NAME)"
              ls -lh "$(Build.ArtifactStagingDirectory)/$(PATCHED_JAR_NAME)"
              echo "[OK] Done"
            displayName: "Verify JAR & Stage Artifact"
            workingDirectory: "$(SPARK_XML_DIR)"

          # --- Build report for audit trail ---
          - script: |
              REPORT="$(Build.ArtifactStagingDirectory)/build-report.txt"
              {
                echo "================================================"
                echo " spark-xml Patched Build Report"
                echo "================================================"
                echo "Date:              $(date)"
                echo "Built by:          $(Build.RequestedFor)"
                echo "Pipeline:          $(Build.BuildNumber)"
                echo "Branch:            $(Build.SourceBranchName)"
                echo "Commit:            $(Build.SourceVersion)"
                echo "Agent:             $(Agent.Name) ($(Agent.MachineName))"
                echo "------------------------------------------------"
                echo "spark-xml version: 0.18.0"
                echo "Scala version:     $(SCALA_VERSION)"
                echo "SBT version:       $(SBT_VERSION)"
                echo "------------------------------------------------"
                echo "CVE Remediation:"
                echo "  woodstox-core upgraded to 7.1.1"
                echo "  Fixes: XXE injection vulnerability"
                echo "  Fixes: DoS via stack overflow"
                echo "------------------------------------------------"
                echo "Output JAR: $(PATCHED_JAR_NAME)"
                echo "================================================"
              } > "$REPORT"
              cat "$REPORT"
            displayName: "Generate Audit Report"

          # --- Publish artifact ---
          - task: PublishBuildArtifacts@1
            displayName: "Publish Patched JAR"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "spark-xml-patched"
              publishLocation: "Container"

  # ============================================================
  # STAGE 3  CVE Vulnerability Scan
  # ============================================================
  - stage: CVEScan
    displayName: "CVE Vulnerability Scan"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: OWASPScan
        displayName: "OWASP Dependency Check"
        timeoutInMinutes: 120

        steps:
          # --- Download the patched JAR artifact from Build stage ---
          - task: DownloadBuildArtifacts@1
            displayName: "Download Patched JAR"
            inputs:
              buildType: "current"
              downloadType: "single"
              artifactName: "spark-xml-patched"
              downloadPath: "$(System.ArtifactsDirectory)"

          # --- Install OWASP Dependency Check ---
          - script: |
              DC_VERSION="12.1.0"
              DC_DIR="/opt/dependency-check"

              # Remove old version if installed version doesn't match
              if [ -f "$DC_DIR/bin/dependency-check.sh" ]; then
                INSTALLED_VERSION=$("$DC_DIR/bin/dependency-check.sh" --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
                if [ "$INSTALLED_VERSION" = "$DC_VERSION" ]; then
                  echo "[OK] OWASP Dependency Check $DC_VERSION already installed"
                  "$DC_DIR/bin/dependency-check.sh" --version
                  exit 0
                else
                  echo "Upgrading from $INSTALLED_VERSION to $DC_VERSION..."
                  sudo rm -rf "$DC_DIR"
                fi
              fi

              echo "Installing unzip..."
              sudo apt-get update -q
              sudo apt-get install -y -q unzip
              echo "[OK] unzip installed"

              echo "Installing OWASP Dependency Check $DC_VERSION..."
              curl -fL "https://github.com/dependency-check/DependencyCheck/releases/download/v${DC_VERSION}/dependency-check-${DC_VERSION}-release.zip" \
                -o /tmp/dependency-check.zip

              if [ ! -f /tmp/dependency-check.zip ]; then
                echo "ERROR: Download failed"
                exit 1
              fi

              sudo unzip -q /tmp/dependency-check.zip -d /opt/
              rm /tmp/dependency-check.zip

              if [ ! -f "$DC_DIR/bin/dependency-check.sh" ]; then
                echo "ERROR: dependency-check.sh not found after extraction"
                ls -la "$DC_DIR/bin/" 2>/dev/null || echo "Directory not found"
                exit 1
              fi

              sudo chmod +x "$DC_DIR/bin/dependency-check.sh"
              echo "[OK] OWASP Dependency Check $DC_VERSION installed"
              "$DC_DIR/bin/dependency-check.sh" --version
            displayName: "Install OWASP Dependency Check"

          # --- Cache NVD database (avoids re-downloading on every run) ---
          - task: Cache@2
            displayName: "Cache NVD CVE Database"
            inputs:
              key: 'owasp-nvd | "$(Agent.OS)"'
              restoreKeys: |
                owasp-nvd | "$(Agent.OS)"
              path: "/opt/dependency-check-data"

          # --- Update NVD CVE database ---
          - script: |
              DC_DIR="/opt/dependency-check"
              DATA_DIR="/opt/dependency-check-data"

              sudo mkdir -p "$DATA_DIR"
              sudo chmod 777 "$DATA_DIR"

              if [ -z "$(NVD_API_KEY)" ]; then
                echo "WARNING: NVD_API_KEY variable is empty - check pipeline variable name"
              else
                echo "[OK] NVD_API_KEY is set (length: ${#NVD_API_KEY} chars)"
              fi

              echo "=== Updating NVD CVE database (with API key) ==="
              "$DC_DIR/bin/dependency-check.sh" \
                --updateonly \
                --data "$DATA_DIR" \
                --nvdApiKey "$(NVD_API_KEY)" \
                --nvdApiDelay 2000 \
                --disableOssIndex \
                && echo "[OK] NVD database updated with API key" \
                || {
                  echo "WARNING: API key update failed - retrying without API key (slower)"
                  echo "NOTE: If this keeps failing, your NVD API key may not be activated yet"
                  "$DC_DIR/bin/dependency-check.sh" \
                    --updateonly \
                    --data "$DATA_DIR" \
                    --nvdApiDelay 6000 \
                    --disableOssIndex \
                    && echo "[OK] NVD database updated without API key" \
                    || (echo "ERROR: Failed to update NVD database both with and without API key" && exit 1)
                }
            displayName: "Update NVD CVE Database"
            env:
              NVD_API_KEY: $(NVD_API_KEY)

          # --- Run the CVE scan against the patched JAR ---
          - script: |
              DC_DIR="/opt/dependency-check"
              DATA_DIR="/opt/dependency-check-data"
              JAR_PATH="$(System.ArtifactsDirectory)/spark-xml-patched/$(PATCHED_JAR_NAME)"
              REPORT_DIR="$(Build.ArtifactStagingDirectory)/cve-report"

              mkdir -p "$REPORT_DIR"

              echo "=== Scanning: $JAR_PATH ==="
              echo "=== Report output: $REPORT_DIR ==="

              "$DC_DIR/bin/dependency-check.sh" \
                --scan "$JAR_PATH" \
                --out "$REPORT_DIR" \
                --data "$DATA_DIR" \
                --format HTML \
                --format JSON \
                --project "spark-xml-patched-0.18.0" \
                --failOnCVSS 7 \
                --enableRetired \
                --disableOssIndex \
                --nvdApiKey "$(NVD_API_KEY)" \
                --nvdApiDelay 2000 \
                --log "$REPORT_DIR/dependency-check.log" \
                && echo "[OK] Scan complete - no HIGH/CRITICAL CVEs found" \
                || (echo "[FAIL] CVEs with CVSS score >= 7 detected - check report" && exit 1)
            displayName: "Run OWASP CVE Scan"
            env:
              NVD_API_KEY: $(NVD_API_KEY)

          # --- Print summary of findings ---
          - script: |
              REPORT_DIR="$(Build.ArtifactStagingDirectory)/cve-report"
              JSON_REPORT="$REPORT_DIR/dependency-check-report.json"

              if [ -f "$JSON_REPORT" ]; then
                echo "=== CVE Scan Summary ==="
                # Count vulnerabilities by severity
                CRITICAL=$(cat "$JSON_REPORT" | grep -o '"severity":"CRITICAL"' | wc -l)
                HIGH=$(cat "$JSON_REPORT" | grep -o '"severity":"HIGH"' | wc -l)
                MEDIUM=$(cat "$JSON_REPORT" | grep -o '"severity":"MEDIUM"' | wc -l)
                LOW=$(cat "$JSON_REPORT" | grep -o '"severity":"LOW"' | wc -l)
                echo "  CRITICAL : $CRITICAL"
                echo "  HIGH     : $HIGH"
                echo "  MEDIUM   : $MEDIUM"
                echo "  LOW      : $LOW"
                echo "========================"

                # Specifically check for woodstox
                WOODSTOX_VULNS=$(cat "$JSON_REPORT" | grep -i "woodstox" | grep -i "vulnerab" | wc -l)
                if [ "$WOODSTOX_VULNS" -eq 0 ]; then
                  echo "[OK] No woodstox vulnerabilities detected"
                else
                  echo "[FAIL] woodstox vulnerabilities still detected - review report"
                fi
              else
                echo "JSON report not found - check HTML report manually"
              fi
            displayName: "Print Scan Summary"
            condition: always()

          # --- Publish CVE report as artifact ---
          - task: PublishBuildArtifacts@1
            displayName: "Publish CVE Report"
            condition: always()
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/cve-report"
              ArtifactName: "cve-scan-report"
              publishLocation: "Container"

  # ============================================================
  # STAGE 4  Summary
  # ============================================================
  - stage: Summary
    displayName: "Build Summary"
    dependsOn: CVEScan
    condition: succeeded()
    jobs:
      - job: PrintSummary
        displayName: "Print Summary"
        steps:
          - script: |
              echo "================================================"
              echo " [OK] Build and CVE Scan Complete!"
              echo "================================================"
              echo ""
              echo " Artifacts:"
              echo "   spark-xml-patched  - patched JAR"
              echo "   cve-scan-report    - OWASP scan report"
              echo ""
              echo " Next steps:"
              echo " 1. Download artifact from pipeline results"
              echo " 2. Review cve-scan-report/dependency-check-report.html"
              echo " 3. Upload to Synapse SparkPool2 workspace packages"
              echo " 4. Remove old spark-xml_2.12-0.18.0.jar"
              echo " 5. Restart Spark pool to pick up new JAR"
              echo "================================================"
            displayName: "Next Steps"
